- Conversational AI
- Customer Service
- Customer Support
- CX
- Generative AI
- Knowledge
- Messaging
apis:
- aid: ada-cx:ada-rest-api
  name: Ada REST API
  description: The Ada REST API is the unified v2 interface to the Ada AI customer
    service platform. It covers knowledge sources and articles, end users, conversations,
    integrations (Actions), data export, data compliance, and webhooks. Authentication
    uses rotatable API keys scoped to a customer instance.
  humanURL: https://docs.ada.cx/reference/introduction/overview
  baseURL: https://{handle}.ada.support/api/v2
  tags:
  - AI Agent
  - Conversations
  - Customer Service
  - Knowledge
  - Webhooks
  properties:
  - type: Documentation
    url: https://docs.ada.cx/reference/introduction/overview
  - type: Authentication
    url: https://docs.ada.cx/reference/introduction/authentication
  - type: OpenAPI
    url: https://docs.ada.cx/openapi.yaml
  - url: graphql/ada-cx-graphql.md
    type: GraphQL
- aid: ada-cx:ada-knowledge-api
  name: Ada Knowledge API
  description: Manage knowledge sources, articles, and tags that Ada's AI Agent uses
    to ground answers to customer questions.
  humanURL: https://docs.ada.cx/reference/knowledge/overview
  baseURL: https://{handle}.ada.support/api/v2
  tags:
  - Articles
  - Knowledge
  - Sources
  - Tags
  properties:
  - type: Documentation
    url: https://docs.ada.cx/reference/knowledge/overview
- aid: ada-cx:ada-conversations-api
  name: Ada Conversations API
  description: Read and manage conversations handled by the Ada AI Agent across all
    supported channels.
  humanURL: https://docs.ada.cx/reference/conversations/overview
  baseURL: https://{handle}.ada.support/api/v2
  tags:
  - Conversations
  - Messaging
  properties:
  - type: Documentation
    url: https://docs.ada.cx/reference/conversations/overview
- aid: ada-cx:ada-end-users-api
  name: Ada End Users API
  description: Create, look up, and update end users (customers) along with their
    metadata for use by Ada's AI Agent and Actions.
  humanURL: https://docs.ada.cx/reference/end-users/overview
  baseURL: https://{handle}.ada.support/api/v2
  tags:
  - Customers
  - End Users
  - Profiles
  properties:
  - type: Documentation
    url: https://docs.ada.cx/reference/end-users/overview
- aid: ada-cx:ada-integrations-api
  name: Ada Integrations (Actions) API
  description: Configure and invoke Actions, the integration layer that lets the Ada
    AI Agent call external systems and APIs during a conversation.
  humanURL: https://docs.ada.cx/reference/integrations/overview
  baseURL: https://{handle}.ada.support/api/v2
