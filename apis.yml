aid: ada-cx
name: Ada
description: Ada (formerly Ada Support) is an AI customer service automation platform
  that resolves customer questions across chat, email, voice, and social channels
  using a generative AI agent grounded in a customer's knowledge sources. Ada exposes
  REST APIs for managing conversations, end users, knowledge sources and articles,
  integrations (Actions), data export, data compliance, and webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/ada-cx/refs/heads/main/apis.yml
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
type: Index
access: 3rd-Party
tags:
